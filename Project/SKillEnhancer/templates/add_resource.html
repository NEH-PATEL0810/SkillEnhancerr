{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>SkillEnhancer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'style1.css' %}">
    <link rel="stylesheet" class="js-color-style" href="{% static 'color-1.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root{
            --orange: hsl(36,80%,50%);
            --white: hsl(0,0%,100%);
            --WHITE:hsl(0,0%,100%);
            --BLACK:hsl(0,0%,0%);
            --black-90: hsl(0,0%,10%);
            --black-70: hsl(0,0%,30%);
            --black-alpha-40: hsl(0,0%,0.4);
            --yellow-light: hsl(44,95%,83%);
            --green-light: hsl(158,68%,75%);
            --red-light: hsl(0,84%,80%);
            --orange-light: hsl(22,85%,80%);
            --select-box-bg-color: hsl(0,0%,100%);
            --border-color-1: hsl(0,0%,90%);
        
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding-top: 80px; /* To avoid content overlap with fixed header */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow-y: auto;
        }

        /* Fixed Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: hsl(0,0%,100%);
            color: white;
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
        }

        .header a {
            color: var(--black-90);
            text-decoration: none;
            font-size: 20px;
        }

        /* Form Container */
        .fcontainer {
            amrgin-top:70px;
            background: white;
            padding: 20px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin-top: 20px; /* Space below the header */
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="file"] {
            border: none;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #218838;
        }

        /* Fixed Footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        .header .container ul li{
            color:var(--black-90);
        }
        .proceed-button {
    
            display: inline-block;
            background-color: #007bff;
            color: white;
            font-size: 18px;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            margin-top:-52px;
            margin-left:-800px;
        }
        
        .proceed-button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
            color:white;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="header-main d-flex justify-content-between align-items-center">
              <div class="header-logo">
                <a href="{% url 'home' %}"><span>Skill</span>Enhancer</a>
              </div>
              <button type="button" class="header-hamburger-btn js-header-menu-toggler">
                <span></span>
              </button>
              <div class="header-backdrop js-header-backdrop"></div>
              <nav class="header-menu js-header-menu">
                <button type="" button class="header-close-btn js-header-menu-toggler">
                  <i class="fas fa-items"></i>
                </button>
                <ul class="menu">
                  <li class="menu-item"><a href="{% url 'tutor_base' %}">Home</a></li>
                  <li class="menu-item"><a href="{% url 'tutor_dashboard' %}">{{user.username}}'s Dashboard</a></li>
                 
                 
               
                <li class="menu-item"><a href="{% url 'contact' %}">Contact</a></li>
                <li class="menu-item"><a href="{% url 'logout' %}">Logout</a></li>
                </ul>
              </nav>
            </div>
          </div>
          </div>
    </header>
    <h2>Add Resource</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="course">Select Course:</label>
        <select name="course" required>
            {% for course in courses %}
                <option value="{{ course.id }}">{{ course.title }}</option>
            {% endfor %}
        </select>
    
        <label for="id_title">Resource Title:</label>
        {{ form.title }}
    
        <label for="id_file">Upload File (PDF/Video):</label>
        {{ form.file }}
    
        <label for="id_url">Website URL:</label>
        {{ form.url }}
    
        <label for="id_video_url">Video URL (YouTube/Video):</label>
        {{ form.video_url }}
    
        <button type="submit" class="btn btn-primary">Add Resource</button>
    </form>
    
    <a href="{% url 'tutor_your_courses' %}" class="proceed-button"><i class='bx bx-left-arrow-alt' ></i>Back to courses</a>
   
</body>
</html>
