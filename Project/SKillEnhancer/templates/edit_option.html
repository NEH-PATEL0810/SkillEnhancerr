{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'style1.css' %}">
    <link rel="stylesheet" class="js-color-style" href="{% static 'color-1.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 50%;
            margin: auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 5px;
        }
        .btn {
            padding: 10px 15px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .save-btn {
            background: #28a745;
            border: none;
        }
        .back-btn {
            background: #007bff;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <div class="main-wrapper">
      <!-- HEADER START -->
    <header class="header">
      <div class="container">
        <div class="header-main d-flex justify-content-between align-items-center">
          <div class="header-logo">
            <a href="{% url 'home' %}"><span>Skill</span>Enhancer</a>
          </div>
          <button type="button" class="header-hamburger-btn js-header-menu-toggler">
            <span></span>
          </button>
          <div class="header-backdrop js-header-backdrop"></div>
          <nav class="header-menu js-header-menu">
            <button type="" button class="header-close-btn js-header-menu-toggler">
              <i class="fas fa-items"></i>
            </button>
            <ul class="menu">
              <li class="menu-item"><a href="{% url 'tutor_base' %}">Home</a></li>
              <li class="menu-item">Hello {{user.username}}</a></li>
             
           
            <li class="menu-item"><a href="{% url 'contact' %}">Contact</a></li>
            <li class="menu-item"><a href="{% url 'logout' %}">Logout</a></li>
            </ul>
          </nav>
        </div>
      </div>
      </div>
    </header>
    <!-- HEADER END -->
{% endif %}

{% if messages %}
<div class="alert-container">
    {% for message in messages %}
    <div class="alert alert-success">
        <h4 class="alert-heading">
        {{ message }}
        </h4>
    </div>
    {% endfor %}
</div>
{% endif %}
<h2>Edit Option</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>
<a href="{% url 'edit_question' option.question.id %}">Cancel</a>
</body>
</html>
