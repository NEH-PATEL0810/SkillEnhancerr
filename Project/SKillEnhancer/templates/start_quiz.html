{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Page</title>
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% comment %} <link rel="stylesheet" href="{% static 'font-awesome.css' %}"> {% endcomment %}
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'style1.css' %}">
    <link rel="stylesheet" class="js-color-style" href="{% static 'color-1.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 60%;
            margin: auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        select, input[type="radio"], button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .question-container {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }
    </style>

    <script>
        function loadQuestions() {
            var quizId = document.getElementById("quiz-select").value;
            fetch(`/get-questions/${quizId}/`)
                .then(response => response.json())
                .then(data => {
                    var questionContainer = document.getElementById("question-container");
                    questionContainer.innerHTML = "";

                    data.questions.forEach(question => {
                        var questionDiv = document.createElement("div");
                        questionDiv.classList.add("question-container");

                        var questionText = document.createElement("p");
                        questionText.textContent = question.text;
                        questionDiv.appendChild(questionText);

                        question.options.forEach(option => {
                            var label = document.createElement("label");
                            label.innerHTML = `
                                <input type="radio" name="question_${question.id}" value="${option.id}"> ${option.text}
                            `;
                            questionDiv.appendChild(label);
                        });

                        questionContainer.appendChild(questionDiv);
                    });
                });
        }
    </script>
</head>

<body>
    <div class="container">
        <h2>Start Quiz</h2>

        <form method="post" action="{% url 'start_quiz' quiz.id %}">
            {% csrf_token %}
            <label>Select Quiz:</label>
            <select name="quiz" id="quiz-select" onchange="loadQuestions()">
                {% for quiz in quizzes %}
                    <option value="{{ quiz.id }}">{{ quiz.title }}</option>
                {% endfor %}
            </select>
            <button type="submit">Start Quiz</button>
        </form>

        <h2>Questions</h2>
        <form method="post" action="{% url 'submit_quiz' quiz.id %}">
            {% csrf_token %}
            <div id="question-container"></div>
            <button type="submit">Submit Quiz</button>
        </form>
    </div>
</body>
</html>
