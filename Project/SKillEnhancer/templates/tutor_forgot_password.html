
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
  </head>
  <body>
    <div class="center">
      <h1>Reset Password</h1>
      
      {% if messages %}
      {% for message in messages %}
          {% if messages.tags == 'error' %}
              <center><h4 style="color: red;">{{message}}</h4></center>
          {% else %}
              <center><h4 style="color: dodgerblue;">{{message}}</h4></center>
          {% endif %}
      {% endfor %}
  {% endif %}
  
      <div class="signup_link">Enter your email to reset password</div>
      
      <form method="POST" action="{% url 'forgot-password-tutor'%}">
{% csrf_token %}
        <div class="txt_field">
          <input type="email"  name="email"required>
          <span></span>
          <label>Email</label>
        </div>
        
        <input type="submit" value="Reset Password">
        <div class="signup_link">
         
          <p>Remember your Password? <a href="{% url 'tutor_login' %}">Login</a></p> 
        </div>
      </form>
    </div>

  </body>
</html>
